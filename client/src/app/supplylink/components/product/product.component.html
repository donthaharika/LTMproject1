<div class="container mt-4">
  <h2>Product Form (Day 22)</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="card p-3" novalidate>

    <div class="mb-3">
      <label for="warehouseId" class="form-label">Warehouse ID *</label>
      <input id="warehouseId" type="number" class="form-control" formControlName="warehouseId" placeholder="Enter warehouse ID">
      <div class="text-danger mt-1" *ngIf="warehouseId.touched && warehouseId.invalid">
        <small *ngIf="warehouseId.errors?.['required']">Warehouse ID is required.</small>
        <small *ngIf="warehouseId.errors?.['min']">Warehouse ID must be a positive number.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="productName" class="form-label">Product Name *</label>
      <input id="productName" type="text" class="form-control" formControlName="productName" placeholder="Enter product name">
      <div class="text-danger mt-1" *ngIf="productName.touched && productName.invalid">
        <small *ngIf="productName.errors?.['required']">Product name is required.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="productDescription" class="form-label">Product Description</label>
      <textarea id="productDescription" class="form-control" rows="3" formControlName="productDescription" placeholder="Optional"></textarea>
    </div>

    <div class="mb-3">
      <label for="quantity" class="form-label">Quantity *</label>
      <input id="quantity" type="number" class="form-control" formControlName="quantity" placeholder="0 or more">
      <div class="text-danger mt-1" *ngIf="quantity.touched && quantity.invalid">
        <small *ngIf="quantity.errors?.['required']">Quantity is required.</small>
        <small *ngIf="quantity.errors?.['min']">Quantity must be non-negative.</small>
      </div>
    </div>

    <div class="mb-3">
      <label for="price" class="form-label">Price *</label>
      <input id="price" type="number" step="0.01" class="form-control" formControlName="price" placeholder="> 0">
      <div class="text-danger mt-1" *ngIf="price.touched && price.invalid">
        <small *ngIf="price.errors?.['required']">Price is required.</small>
        <small *ngIf="price.errors?.['min']">Price must be greater than 0.</small>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid">Submit</button>
  </form>

  <div class="mt-3" *ngIf="createdProduct">
    <h6>Preview:</h6>
    <pre>{{ createdProduct | json }}</pre>
  </div>
</div>
